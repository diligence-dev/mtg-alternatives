<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Alternatives</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #eee;
        }

        .search-input:focus {
            outline: none;
            border-color: #e94560;
        }

        .search-btn {
            padding: 12px 30px;
            font-size: 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #ff6b6b;
        }

        .search-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .error {
            background: #3a1a1a;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #e94560;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            background: #16213e;
            border: 3px solid transparent;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
        }

        .card.selected {
            border-color: #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .card-name {
            padding: 10px;
            font-size: 14px;
            text-align: center;
            color: #ccc;
        }

        .show-more-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .show-more-btn {
            padding: 12px 40px;
            font-size: 16px;
            background: #0f3460;
            color: #eee;
            border: 2px solid #e94560;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .show-more-btn:hover {
            background: #16213e;
        }

        .show-more-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        .detail-section {
            display: none;
            background: #16213e;
            border-radius: 12px;
            padding: 30px;
        }

        .detail-section.visible {
            display: block;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-card-image {
            width: 200px;
            height: auto;
            border-radius: 8px;
        }

        .detail-card-name {
            font-size: 24px;
            color: #e94560;
        }

        .alternatives-section h3 {
            margin-bottom: 20px;
            color: #eee;
        }

        .alternatives-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .alternative-card {
            background: #1a1a2e;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .alternative-card:hover {
            transform: scale(1.03);
        }

        .alternative-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        .upload-section {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 8px;
        }

        .upload-section h3 {
            margin-bottom: 15px;
            color: #eee;
        }

        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-input {
            padding: 10px;
            background: #16213e;
            border: 2px solid #333;
            border-radius: 8px;
            color: #eee;
        }

        .upload-btn {
            padding: 12px 30px;
            font-size: 16px;
            background: #4ecca3;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #45b390;
        }

        .upload-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .no-alternatives {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .detail-header {
                flex-direction: column;
                text-align: center;
            }

            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-section">
            <input type="text" id="search-input" class="search-input" placeholder="Search for a Magic card (e.g., 'Black Lotus')">
            <button id="search-btn" class="search-btn">Search</button>
        </div>

        <div id="error-message" class="error" style="display: none;"></div>

        <div id="loading" class="loading" style="display: none;">
            Searching...
        </div>

        <div id="results" class="card-grid"></div>

        <div id="show-more-section" class="show-more-section" style="display: none;">
            <button id="show-more-btn" class="show-more-btn">Show more</button>
        </div>

        <div id="detail" class="detail-section">
            <div class="detail-header">
                <img id="detail-card-image" class="detail-card-image" src="" alt="">
                <h2 id="detail-card-name" class="detail-card-name"></h2>
            </div>

            <div class="alternatives-section">
                <h3>Alternative Artworks</h3>
                <div id="alternatives-loading" class="loading" style="display: none;">
                    Loading alternatives...
                </div>
                <div id="alternatives-grid" class="alternatives-grid"></div>
                <div id="no-alternatives" class="no-alternatives" style="display: none;">
                    No alternative artworks yet. Upload one below!
                </div>

                <div class="upload-section">
                    <h3>Upload New Alternative</h3>
                    <form id="upload-form" class="upload-form">
                        <input type="file" id="file-input" class="file-input" accept="image/png,image/jpeg,image/webp" required>
                        <button type="submit" id="upload-btn" class="upload-btn">Upload</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PAGE_SIZE = 30;

        let selectedCard = null;
        let allCards = [];
        let displayedCount = 0;
        let scryfallHasMore = false;
        let scryfallNextPage = null;
        let currentQuery = '';

        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const resultsDiv = document.getElementById('results');
        const detailSection = document.getElementById('detail');
        const errorMessage = document.getElementById('error-message');
        const loadingDiv = document.getElementById('loading');
        const showMoreSection = document.getElementById('show-more-section');
        const showMoreBtn = document.getElementById('show-more-btn');
        const alternativesGrid = document.getElementById('alternatives-grid');
        const alternativesLoading = document.getElementById('alternatives-loading');
        const noAlternatives = document.getElementById('no-alternatives');
        const uploadForm = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');

        searchBtn.addEventListener('click', handleSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
        showMoreBtn.addEventListener('click', handleShowMore);
        uploadForm.addEventListener('submit', handleUpload);

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        function getCardImage(card) {
            return card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || '';
        }

        function getCardBackImage(card) {
            if (card.image_uris?.normal) return '';
            return card.card_faces?.[1]?.image_uris?.normal || '';
        }

        function toCard(raw) {
            return {
                id: raw.id,
                name: raw.name,
                image: getCardImage(raw),
                back_image: getCardBackImage(raw),
            };
        }

        function createCardElement(card) {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.dataset.scryfallId = card.id;

            const img = document.createElement('img');
            img.src = card.image;
            img.alt = card.name;
            img.loading = 'lazy';

            if (card.back_image) {
                new Image().src = card.back_image;
                cardEl.addEventListener('mouseenter', () => { img.src = card.back_image; });
                cardEl.addEventListener('mouseleave', () => { img.src = card.image; });
            }

            const nameEl = document.createElement('div');
            nameEl.className = 'card-name';
            nameEl.textContent = card.name;

            cardEl.appendChild(img);
            cardEl.appendChild(nameEl);
            cardEl.addEventListener('click', () => selectCard(card));
            return cardEl;
        }

        function createAlternativeElement(alt) {
            const altEl = document.createElement('div');
            altEl.className = 'alternative-card';

            const img = document.createElement('img');
            img.src = alt.url;
            img.alt = 'Alternative artwork';

            altEl.appendChild(img);
            return altEl;
        }

        function renderNextBatch() {
            const end = Math.min(displayedCount + PAGE_SIZE, allCards.length);
            for (let i = displayedCount; i < end; i++) {
                resultsDiv.appendChild(createCardElement(allCards[i]));
            }
            displayedCount = end;
            updateShowMoreButton();
        }

        function updateShowMoreButton() {
            const canShowMore = displayedCount < allCards.length || scryfallHasMore;
            showMoreSection.style.display = canShowMore ? 'block' : 'none';
            showMoreBtn.disabled = false;
        }

        async function handleSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                showError('Please enter a search query');
                return;
            }

            currentQuery = query;
            allCards = [];
            displayedCount = 0;
            scryfallHasMore = false;
            scryfallNextPage = null;

            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            resultsDiv.className = 'card-grid';
            showMoreSection.style.display = 'none';
            detailSection.classList.remove('visible');
            errorMessage.style.display = 'none';

            try {
                const response = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.details || 'Search failed');
                }

                appendScryfallPage(data);
            } catch (error) {
                showError(error.message);
                resultsDiv.textContent = 'Search failed. Please try again.';
                resultsDiv.className = 'no-alternatives';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function appendScryfallPage(data) {
            const cards = data.data.map(toCard).filter(c => c.image);
            allCards = allCards.concat(cards);
            scryfallHasMore = data.has_more || false;
            scryfallNextPage = data.next_page || null;

            if (allCards.length === 0) {
                resultsDiv.textContent = 'No results found';
                resultsDiv.className = 'no-alternatives';
                return;
            }

            resultsDiv.className = 'card-grid';
            renderNextBatch();
        }

        async function handleShowMore() {
            if (displayedCount >= allCards.length && scryfallHasMore && scryfallNextPage) {
                showMoreBtn.disabled = true;
                showMoreBtn.textContent = 'Loading...';
                try {
                    const response = await fetch(scryfallNextPage);
                    const data = await response.json();
                    if (!response.ok) {
                        throw new Error(data.details || 'Failed to load more cards');
                    }
                    appendScryfallPage(data);
                } catch (error) {
                    showError(error.message);
                } finally {
                    showMoreBtn.textContent = 'Show more';
                }
            } else {
                renderNextBatch();
            }
        }

        async function selectCard(card) {
            selectedCard = card;

            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            const cardEl = document.querySelector(`.card[data-scryfall-id="${CSS.escape(card.id)}"]`);
            if (cardEl) cardEl.classList.add('selected');

            detailSection.classList.add('visible');
            const detailImg = document.getElementById('detail-card-image');
            detailImg.src = card.image;

            if (card.back_image) {
                new Image().src = card.back_image;
                detailImg.onmouseenter = () => { detailImg.src = card.back_image; };
                detailImg.onmouseleave = () => { detailImg.src = card.image; };
            } else {
                detailImg.onmouseenter = null;
                detailImg.onmouseleave = null;
            }

            document.getElementById('detail-card-name').textContent = card.name;

            await loadAlternatives(card.id);
        }

        async function loadAlternatives(scryfallId) {
            alternativesLoading.style.display = 'block';
            alternativesGrid.innerHTML = '';
            noAlternatives.style.display = 'none';

            try {
                const response = await fetch(`/api/alternatives?scryfall_id=${scryfallId}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load alternatives');
                }

                if (!data.alternatives || data.alternatives.length === 0) {
                    noAlternatives.style.display = 'block';
                    return;
                }

                data.alternatives.forEach(alt => {
                    alternativesGrid.appendChild(createAlternativeElement(alt));
                });

            } catch (error) {
                showError(error.message);
                alternativesGrid.textContent = 'Failed to load alternatives';
                alternativesGrid.className = 'no-alternatives';
            } finally {
                alternativesLoading.style.display = 'none';
            }
        }

        async function handleUpload(e) {
            e.preventDefault();

            if (!selectedCard) {
                showError('Please select a card first');
                return;
            }

            const file = fileInput.files[0];
            if (!file) {
                showError('Please select a file');
                return;
            }

            const allowedTypes = ['image/png', 'image/jpeg', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                showError('Invalid file type. Please upload a PNG, JPEG, or WebP image');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showError('File too large. Maximum size is 5MB');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            const formData = new FormData();
            formData.append('scryfall_id', selectedCard.id);
            formData.append('image', file);

            try {
                const response = await fetch('/api/alternatives', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }

                await loadAlternatives(selectedCard.id);

                fileInput.value = '';
                showError('Alternative artwork uploaded successfully!');

            } catch (error) {
                showError(error.message);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload';
            }
        }
    </script>
</body>
</html>
